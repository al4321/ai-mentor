<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Computer Networks Mentor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg:        #03070d;
            --bg-panel:  #060e18;
            --bg-input:  #040b14;
            --border:    #0a2540;
            --border-hi: #0d3a5c;
            --cyan:      #00e5ff;
            --cyan-dim:  #007a99;
            --green:     #00ff88;
            --pink:      #ff2d6b;
            --pink-dim:  #7a1433;
            --text:      #b0d8f0;
            --text-dim:  #2e5570;
            --mono:      'Share Tech Mono', monospace;
            --sans:      'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            background: var(--bg);
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            font-family: var(--mono);
            color: var(--text);
            overflow: hidden;
        }

        /* ── Header ─────────────────────────────────── */
        header {
            width: 100%;
            padding: 14px 24px;
            background: rgba(6,14,24,0.95);
            border-bottom: 1px solid var(--cyan-dim);
            text-align: center;
            flex-shrink: 0;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 1px;
            background: var(--cyan);
            box-shadow: 0 0 12px 2px var(--cyan);
            opacity: 0.6;
        }

        header h1 {
            font-family: var(--sans);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cyan);
            text-shadow: 0 0 18px var(--cyan), 0 0 40px rgba(0,229,255,0.4);
        }

        /* ── Layout ──────────────────────────────────── */
        .layout {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            padding: 16px;
            overflow: hidden;
        }

        /* ── Sessions sidebar ────────────────────────── */
        .sessions-panel {
            width: 20%;
            height: 90%;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-top: 2px solid var(--cyan-dim);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,229,255,0.05), inset 0 0 30px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }

        .sessions-panel .panel-title {
            padding: 10px 14px;
            font-family: var(--sans);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--cyan-dim);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .new-session-btn {
            background: none;
            border: 1px solid var(--cyan-dim);
            color: var(--cyan);
            cursor: pointer;
            font-family: var(--mono);
            font-size: 1rem;
            line-height: 1;
            padding: 1px 8px;
            border-radius: 2px;
            transition: all 0.15s;
        }

        .new-session-btn:hover:not(:disabled) {
            border-color: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            background: rgba(0,229,255,0.08);
        }

        .new-session-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #sessionList {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-hi) transparent;
        }

        #sessionList.loading {
            pointer-events: none;
            opacity: 0.4;
        }

        .session-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text);
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-item-info {
            flex: 1;
            min-width: 0;
        }

        .session-delete-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px 5px;
            border-radius: 2px;
            line-height: 1;
            transition: color 0.15s, background 0.15s;
        }

        .session-delete-btn:hover {
            color: var(--pink);
            background: rgba(255,45,107,0.1);
            box-shadow: 0 0 6px rgba(255,45,107,0.3);
        }

        .session-item:hover {
            background: rgba(0,229,255,0.04);
        }

        .session-item.active {
            background: rgba(0,229,255,0.06);
            border-left: 2px solid var(--cyan);
            box-shadow: inset 2px 0 10px rgba(0,229,255,0.1);
        }

        .session-item .session-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .session-item .session-id {
            font-size: 0.68rem;
            color: var(--green);
            margin-top: 2px;
            text-shadow: 0 0 6px rgba(0,255,136,0.5);
        }

        .session-item .session-date {
            font-size: 0.65rem;
            color: var(--cyan-dim);
            margin-top: 2px;
        }

        /* ── Session frame ───────────────────────────── */
        .frame {
            width: 50%;
            height: 90%;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-top: 2px solid var(--cyan-dim);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,229,255,0.06), inset 0 0 40px rgba(0,0,0,0.5);
        }

        #output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
            background: var(--bg-input);
            scrollbar-width: thin;
            scrollbar-color: var(--border-hi) transparent;
        }

        #output .message {
            margin-bottom: 14px;
            padding: 12px 16px;
            border-radius: 2px;
            border: 1px solid transparent;
        }

        #output .message.assistant {
            background: rgba(0,229,255,0.04);
            border-color: var(--border-hi);
            border-left: 2px solid var(--cyan);
            box-shadow: inset 0 0 20px rgba(0,229,255,0.03);
        }

        #output .message.user {
            background: rgba(255,45,107,0.05);
            border-color: var(--pink-dim);
            border-right: 2px solid var(--pink);
            text-align: right;
        }

        #output .message .label {
            font-family: var(--sans);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
            color: var(--cyan-dim);
        }

        #output .message.user .label {
            color: var(--pink-dim);
        }

        #output .message .content {
            white-space: pre-wrap;
        }

        .status {
            font-size: 0.72rem;
            padding: 5px 18px;
            color: var(--text);
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            min-height: 26px;
            flex-shrink: 0;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spinner-overlay {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
            background: rgba(3,7,13,0.5);
            pointer-events: none;
            z-index: 10;
        }

        .spinner-overlay.active {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-hi);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            box-shadow: 0 0 16px var(--cyan);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 14px 16px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #messageInput {
            flex: 1;
            padding: 9px 14px;
            border: 1px solid var(--border-hi);
            border-radius: 2px;
            background: var(--bg-input);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #messageInput::placeholder {
            color: var(--cyan-dim);
        }

        #messageInput:focus {
            border-color: var(--cyan-dim);
            box-shadow: 0 0 10px rgba(0,229,255,0.15);
        }

        #messageInput:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #sendBtn {
            padding: 9px 22px;
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan-dim);
            border-radius: 2px;
            font-family: var(--sans);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #sendBtn:hover:not(:disabled) {
            background: rgba(0,229,255,0.1);
            border-color: var(--cyan);
            box-shadow: 0 0 14px rgba(0,229,255,0.3);
            color: #fff;
        }

        #sendBtn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <h1>AI Computer Networks Mentor</h1>
    </header>

    <div class="layout">
        <div class="sessions-panel">
            <div class="panel-title">
                <span>Chats</span>
                <button class="new-session-btn" id="newSessionBtn" title="New chat">＋</button>
            </div>
            <div id="sessionList"></div>
        </div>

        <div class="frame">
            <div id="output">
                <div class="spinner-overlay" id="spinnerOverlay">
                    <div class="spinner"></div>
                </div>
            </div>
            <div class="status" id="status">
                <span id="statusText">Initializing chat...</span>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your question..." disabled />
                <button id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        let sessionId = 0;
        let isLoading = false;

        const output = document.getElementById('output');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('statusText');
        const spinnerOverlay = document.getElementById('spinnerOverlay');

        function setStatus(text, loading = false) {
            statusEl.textContent = text;
            spinnerOverlay.classList.toggle('active', loading);
        }

        function clearOutput() {
            output.querySelectorAll('.message').forEach(el => el.remove());
        }
        const sessionList = document.getElementById('sessionList');
        const newSessionBtn = document.getElementById('newSessionBtn');

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = role === 'assistant' ? 'Mentor' : 'You';
            const content = document.createElement('div');
            content.className = 'content';
            content.textContent = text;
            div.appendChild(label);
            div.appendChild(content);
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        async function postMessage(id, content) {
            const response = await fetch(`/sessions/${id}/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: content ? JSON.stringify({ content }) : 'null'
            });
            if (!response.ok) {
                const err = await response.text();
                throw new Error(err || `HTTP ${response.status}`);
            }
            return response.json();
        }

        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                if (!response.ok) return;
                const sessions = await response.json();
                renderSessions(sessions);
            } catch {
                // non-critical, sidebar stays empty
            }
        }

        function renderSessions(sessions) {
            sessionList.innerHTML = '';
            for (const s of sessions) {
                const item = document.createElement('div');
                item.className = 'session-item' + (s.id === sessionId ? ' active' : '');
                item.dataset.id = s.id;

                const info = document.createElement('div');
                info.className = 'session-item-info';

                const name = document.createElement('div');
                name.className = 'session-name';
                name.textContent = `${s.name} #${s.id}`;

                const date = document.createElement('div');
                date.className = 'session-date';
                date.textContent = new Date(s.createdAt).toLocaleString();

                info.appendChild(name);
                info.appendChild(date);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'session-delete-btn';
                deleteBtn.textContent = '✕';
                deleteBtn.title = 'Delete chat';
                deleteBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    deleteSession(s.id);
                });

                item.appendChild(info);
                item.appendChild(deleteBtn);
                item.addEventListener('click', () => selectSession(s.id));
                sessionList.appendChild(item);
            }
        }

        async function deleteSession(id) {
            if (isLoading) return;
            try {
                const response = await fetch(`/sessions/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                if (id === sessionId) {
                    sessionId = 0;
                    clearOutput();
                    setStatus('Chat deleted. Start a new one with the + button.');
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                }
                await loadSessions();
            } catch (e) {
                setStatus(`Failed to delete chat: ${e.message}`);
            }
        }

        function setActiveSession(id) {
            sessionId = id;
            sessionList.querySelectorAll('.session-item').forEach(el => {
                el.classList.toggle('active', Number(el.dataset.id) === id);
            });
        }

        function setSessionsLoading(value) {
            isLoading = value;
            sessionList.classList.toggle('loading', value);
            newSessionBtn.disabled = value;
        }

        async function startNewSession() {
            if (isLoading) return;
            clearOutput();
            messageInput.disabled = true;
            sendBtn.disabled = true;
            setSessionsLoading(true);
            setStatus('Starting new chat...', true);
            try {
                const data = await postMessage(0, null);
                sessionId = data.sessionId;
                appendMessage('assistant', data.content);
                setStatus(`Chat started (id: ${sessionId})`);
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
                await loadSessions();
            } catch (e) {
                setStatus(`Failed to start chat: ${e.message}`);
            } finally {
                setSessionsLoading(false);
            }
        }

        async function selectSession(id) {
            if (id === sessionId || isLoading) return;
            setActiveSession(id);
            clearOutput();
            messageInput.disabled = true;
            sendBtn.disabled = true;
            setSessionsLoading(true);
            setStatus('Loading chat...', true);
            try {
                const response = await fetch(`/sessions/${id}/messages`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const messages = await response.json();
                for (const m of messages) {
                    appendMessage(m.role === 'user' ? 'user' : 'assistant', m.content);
                }
                setStatus(`Chat id: ${sessionId}`);
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            } catch (e) {
                setStatus(`Error: ${e.message}`);
            } finally {
                setSessionsLoading(false);
            }
        }

        async function init() {
            await loadSessions();
            setSessionsLoading(true);
            setStatus('Initializing chat...', true);
            try {
                const data = await postMessage(0, null);
                sessionId = data.sessionId;
                appendMessage('assistant', data.content);
                setStatus(`Chat started (id: ${sessionId})`);
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
                await loadSessions();
            } catch (e) {
                setStatus(`Failed to start chat: ${e.message}`);
            } finally {
                setSessionsLoading(false);
            }
        }

        async function handleSend() {
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.disabled = true;
            sendBtn.disabled = true;
            setStatus('Waiting for response...', true);
            appendMessage('user', text);
            messageInput.value = '';

            try {
                const data = await postMessage(sessionId, text);
                appendMessage('assistant', data.content);
                setStatus(`Chat id: ${sessionId}`);
            } catch (e) {
                setStatus(`Error: ${e.message}`);
            } finally {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        newSessionBtn.addEventListener('click', startNewSession);
        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSend();
        });

        init();
    </script>
</body>
</html>
