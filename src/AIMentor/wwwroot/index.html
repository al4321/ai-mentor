<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Computer Networks Mentor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 16px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            text-align: center;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e94560;
            letter-spacing: 0.5px;
        }

        .layout {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 16px;
            overflow: hidden;
        }

        /* Sessions sidebar */
        .sessions-panel {
            width: 20%;
            height: 90%;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .sessions-panel .panel-title {
            padding: 14px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #888;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        #sessionList {
            flex: 1;
            overflow-y: auto;
        }

        #sessionList.loading {
            pointer-events: none;
            opacity: 0.5;
        }

        .session-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #0f3460;
            font-size: 0.85rem;
            color: #c8d6e5;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-item-info {
            flex: 1;
            min-width: 0;
        }

        .session-delete-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px 4px;
            border-radius: 4px;
            line-height: 1;
            transition: color 0.15s, background 0.15s;
        }

        .session-delete-btn:hover {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .session-item:hover {
            background: #0f3460;
        }

        .session-item.active {
            background: #0f3460;
            border-left: 3px solid #e94560;
        }

        .session-item .session-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-item .session-id {
            font-size: 0.72rem;
            color: #e94560;
            margin-top: 3px;
        }

        .session-item .session-date {
            font-size: 0.72rem;
            color: #666;
            margin-top: 2px;
        }

        /* Chat frame */
        .frame {
            width: 50%;
            height: 90%;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        #output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #c8d6e5;
            background: #0d1b2a;
        }

        #output .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
        }

        #output .message.assistant {
            background: #1a2a3a;
            border-left: 3px solid #e94560;
        }

        #output .message.user {
            background: #0f3460;
            border-left: 3px solid #4fc3f7;
            text-align: right;
        }

        #output .message .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            opacity: 0.6;
        }

        #output .message .content {
            white-space: pre-wrap;
        }

        .status {
            font-size: 0.8rem;
            padding: 6px 20px;
            color: #888;
            background: #16213e;
            border-top: 1px solid #0f3460;
            min-height: 28px;
            flex-shrink: 0;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            flex-shrink: 0;
        }

        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #0d1b2a;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #messageInput:focus {
            border-color: #e94560;
        }

        #messageInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #sendBtn {
            padding: 10px 22px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            white-space: nowrap;
        }

        #sendBtn:hover:not(:disabled) {
            background: #c73652;
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <h1>AI Computer Networks Mentor</h1>
    </header>

    <div class="layout">
        <div class="sessions-panel">
            <div class="panel-title">Sessions</div>
            <div id="sessionList"></div>
        </div>

        <div class="frame">
            <div id="output"></div>
            <div class="status" id="status">Initializing session...</div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your question..." disabled />
                <button id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        let sessionId = 0;
        let isLoading = false;

        const output = document.getElementById('output');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        const sessionList = document.getElementById('sessionList');

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = role === 'assistant' ? 'Mentor' : 'You';
            const content = document.createElement('div');
            content.className = 'content';
            content.textContent = text;
            div.appendChild(label);
            div.appendChild(content);
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        async function postMessage(id, content) {
            const response = await fetch(`/sessions/${id}/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: content ? JSON.stringify({ content }) : 'null'
            });
            if (!response.ok) {
                const err = await response.text();
                throw new Error(err || `HTTP ${response.status}`);
            }
            return response.json();
        }

        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                if (!response.ok) return;
                const sessions = await response.json();
                renderSessions(sessions);
            } catch {
                // non-critical, sidebar stays empty
            }
        }

        function renderSessions(sessions) {
            sessionList.innerHTML = '';
            for (const s of sessions) {
                const item = document.createElement('div');
                item.className = 'session-item' + (s.id === sessionId ? ' active' : '');
                item.dataset.id = s.id;

                const info = document.createElement('div');
                info.className = 'session-item-info';

                const name = document.createElement('div');
                name.className = 'session-name';
                name.textContent = s.name;

                const sid = document.createElement('div');
                sid.className = 'session-id';
                sid.textContent = `#${s.id}`;

                const date = document.createElement('div');
                date.className = 'session-date';
                date.textContent = new Date(s.createdAt).toLocaleString();

                info.appendChild(name);
                info.appendChild(sid);
                info.appendChild(date);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'session-delete-btn';
                deleteBtn.textContent = '✕';
                deleteBtn.title = 'Delete session';
                deleteBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    deleteSession(s.id);
                });

                item.appendChild(info);
                item.appendChild(deleteBtn);
                item.addEventListener('click', () => selectSession(s.id));
                sessionList.appendChild(item);
            }
        }

        async function deleteSession(id) {
            if (isLoading) return;
            try {
                const response = await fetch(`/sessions/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                if (id === sessionId) {
                    sessionId = 0;
                    output.innerHTML = '';
                    status.textContent = 'Session deleted. Start a new one by refreshing the page.';
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                }
                await loadSessions();
            } catch (e) {
                status.textContent = `Failed to delete session: ${e.message}`;
            }
        }

        function setActiveSession(id) {
            sessionId = id;
            sessionList.querySelectorAll('.session-item').forEach(el => {
                el.classList.toggle('active', Number(el.dataset.id) === id);
            });
        }

        function setSessionsLoading(value) {
            isLoading = value;
            sessionList.classList.toggle('loading', value);
        }

        async function selectSession(id) {
            if (id === sessionId || isLoading) return;
            setActiveSession(id);
            output.innerHTML = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;
            setSessionsLoading(true);
            status.textContent = 'Loading session...';
            try {
                const response = await fetch(`/sessions/${id}/messages`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const messages = await response.json();
                for (const m of messages) {
                    appendMessage(m.role === 'user' ? 'user' : 'assistant', m.content);
                }
                status.textContent = `Session id: ${sessionId}`;
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            } catch (e) {
                status.textContent = `Error: ${e.message}`;
            } finally {
                setSessionsLoading(false);
            }
        }

        async function init() {
            await loadSessions();
            setSessionsLoading(true);
            try {
                const data = await postMessage(0, null);
                sessionId = data.sessionId;
                appendMessage('assistant', data.content);
                status.textContent = `Session started (id: ${sessionId})`;
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
                await loadSessions();
            } catch (e) {
                status.textContent = `Failed to start session: ${e.message}`;
            } finally {
                setSessionsLoading(false);
            }
        }

        async function handleSend() {
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.disabled = true;
            sendBtn.disabled = true;
            status.textContent = 'Waiting for response...';
            appendMessage('user', text);
            messageInput.value = '';

            try {
                const data = await postMessage(sessionId, text);
                appendMessage('assistant', data.content);
                status.textContent = `Session id: ${sessionId}`;
            } catch (e) {
                status.textContent = `Error: ${e.message}`;
            } finally {
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSend();
        });

        init();
    </script>
</body>
</html>
